openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification for RGI Strategic Intelligence System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Scraped article operations
  - name: sources
    description: Source management
  - name: digest
    description: AI-generated digest articles
  - name: dashboard
    description: Dashboard summary operations
  - name: scrape
    description: Scraping operations
  - name: professors
    description: Professor Library operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scrape/trigger:
    post:
      operationId: triggerScrape
      tags: [scrape]
      summary: Manually trigger a scrape
      description: Triggers an immediate scrape of all active sources
      responses:
        "200":
          description: Scrape triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeResult"

  /scrape/status:
    get:
      operationId: getScrapeStatus
      tags: [scrape]
      summary: Get last scrape status
      responses:
        "200":
          description: Scrape status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeStatus"

  /professors/config:
    get:
      operationId: getProfessorLibraryConfig
      tags: [professors]
      summary: Get Professor Library configuration
      responses:
        "200":
          description: Professor Library configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorLibraryConfigResponse"

  /professors:
    get:
      operationId: listProfessorProfiles
      tags: [professors]
      summary: List professor profiles
      parameters:
        - name: status
          in: query
          description: Filter by whether a professor is included in future article matching.
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Professor profile list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfessorProfilesResponse"
    post:
      operationId: createProfessorProfile
      tags: [professors]
      summary: Create a professor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfessorProfileBody"
      responses:
        "201":
          description: Created professor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "403":
          description: Professor Library writes disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /professors/{id}:
    get:
      operationId: getProfessorProfile
      tags: [professors]
      summary: Get a professor profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{8,128}$'
      responses:
        "200":
          description: Professor profile detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfessorProfile
      tags: [professors]
      summary: Update a professor profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{8,128}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfessorProfileBody"
      responses:
        "200":
          description: Updated professor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "403":
          description: Professor Library writes disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List scraped articles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, selected, dismissed]
        - name: minScore
          in: query
          schema:
            type: number
        - name: topicTag
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
            enum: [news, twitter, linkedin]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [relevance, time, source]
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete a scraped article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /digest:
    get:
      operationId: listDigestArticles
      tags: [digest]
      summary: List digest articles (generated, pending review, approved, rejected)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_review, approved, rejected, regenerating]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of digest articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigestArticle"

  /digest/generate:
    post:
      operationId: generateDigestArticle
      tags: [digest]
      summary: Generate an RGI Strategic Brief from one or more scraped articles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDigestBody"
      responses:
        "201":
          description: Generated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}:
    get:
      operationId: getDigestArticle
      tags: [digest]
      summary: Get a single digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDigestArticle
      tags: [digest]
      summary: Update a digest article (edit content, status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDigestArticleBody"
      responses:
        "200":
          description: Updated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDigestArticle
      tags: [digest]
      summary: Delete a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /digest/{id}/approve:
    post:
      operationId: approveDigestArticle
      tags: [digest]
      summary: Approve and publish a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}/reject:
    post:
      operationId: rejectDigestArticle
      tags: [digest]
      summary: Reject a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDigestBody"
      responses:
        "200":
          description: Rejected digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}/regenerate:
    post:
      operationId: regenerateDigestArticle
      tags: [digest]
      summary: Regenerate a digest article with optional editor notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateDigestBody"
      responses:
        "200":
          description: Regenerated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List all sources
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
    post:
      operationId: createSource
      tags: [sources]
      summary: Add a new source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceBody"
      responses:
        "201":
          description: Created source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"

  /sources/{id}:
    patch:
      operationId: updateSource
      tags: [sources]
      summary: Update a source (enable/disable, change tier, authority level)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceBody"
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
    delete:
      operationId: deleteSource
      tags: [sources]
      summary: Remove a source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/settings:
    get:
      operationId: getSettings
      tags: [dashboard]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [dashboard]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ScrapeResult:
      type: object
      properties:
        message:
          type: string
        articlesFound:
          type: integer
        articlesAdded:
          type: integer
      required:
        - message
        - articlesFound
        - articlesAdded

    ScrapeStatus:
      type: object
      properties:
        lastScrapeAt:
          type: ["string", "null"]
        lastScrapeArticlesFound:
          type: ["integer", "null"]
        isRunning:
          type: boolean
      required:
        - isRunning

    ProfessorProfile:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
          minLength: 1
          maxLength: 160
        academicTitle:
          type: string
          minLength: 1
          maxLength: 160
        department:
          type: string
          minLength: 1
          maxLength: 160
        coursesTaught:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 120
        expertiseTags:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 80
        researchInterests:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 160
        industries:
          type: array
          maxItems: 30
          items:
            type: string
            maxLength: 80
        regions:
          type: array
          maxItems: 30
          items:
            type: string
            maxLength: 80
        professionalBackground:
          type: string
          maxLength: 2000
        approvedBio:
          type: string
          maxLength: 2000
        publications:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 240
        recurringThemes:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 120
        contactableTopics:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 120
        doNotContactTopics:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 120
        status:
          type: string
          description: Active profiles are included in future article matching; inactive profiles are retained but excluded.
          enum: [active, inactive]
        schemaVersion:
          type: integer
          minimum: 1
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - fullName
        - academicTitle
        - department
        - coursesTaught
        - expertiseTags
        - researchInterests
        - industries
        - regions
        - professionalBackground
        - approvedBio
        - publications
        - recurringThemes
        - contactableTopics
        - doNotContactTopics
        - status
        - schemaVersion
        - createdAt
        - updatedAt

    ProfessorLibraryConfigResponse:
      type: object
      properties:
        writesEnabled:
          type: boolean
      required:
        - writesEnabled

    ListProfessorProfilesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProfessorProfile"
        total:
          type: integer
        writesEnabled:
          type: boolean
      required:
        - items
        - total
        - writesEnabled

    ProfessorProfileDetailResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfessorProfile"
        writesEnabled:
          type: boolean
      required:
        - profile
        - writesEnabled

    CreateProfessorProfileBody:
      type: object
      additionalProperties: false
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 160
        academicTitle:
          type: string
          minLength: 1
          maxLength: 160
        department:
          type: string
          minLength: 1
          maxLength: 160
        coursesTaught:
          type: array
          items:
            type: string
        expertiseTags:
          type: array
          items:
            type: string
        researchInterests:
          type: array
          items:
            type: string
        industries:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string
        professionalBackground:
          type: string
        approvedBio:
          type: string
        publications:
          type: array
          items:
            type: string
        recurringThemes:
          type: array
          items:
            type: string
        contactableTopics:
          type: array
          items:
            type: string
        doNotContactTopics:
          type: array
          items:
            type: string
        status:
          type: string
          description: Active profiles are included in future article matching; inactive profiles are retained but excluded.
          enum: [active, inactive]
      required:
        - fullName
        - academicTitle
        - department

    UpdateProfessorProfileBody:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 160
        academicTitle:
          type: string
          minLength: 1
          maxLength: 160
        department:
          type: string
          minLength: 1
          maxLength: 160
        coursesTaught:
          type: array
          items:
            type: string
        expertiseTags:
          type: array
          items:
            type: string
        researchInterests:
          type: array
          items:
            type: string
        industries:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string
        professionalBackground:
          type: string
        approvedBio:
          type: string
        publications:
          type: array
          items:
            type: string
        recurringThemes:
          type: array
          items:
            type: string
        contactableTopics:
          type: array
          items:
            type: string
        doNotContactTopics:
          type: array
          items:
            type: string
        status:
          type: string
          description: Active profiles are included in future article matching; inactive profiles are retained but excluded.
          enum: [active, inactive]

    Article:
      type: object
      properties:
        id:
          type: integer
        headline:
          type: string
        url:
          type: string
        sourceName:
          type: string
        sourceUrl:
          type: ["string", "null"]
        author:
          type: ["string", "null"]
        authorType:
          type: ["string", "null"]
        platform:
          type: ["string", "null"]
        isEmergingSignal:
          type: boolean
        isPrimarySignal:
          type: boolean
        relevancyScore:
          type: number
        authenticityScore:
          type: ["number", "null"]
          description: Credibility score 1-10 based on source reputation, primary vs secondary reporting, author authority, and cross-source validation
        viewpoint:
          type: ["string", "null"]
          description: One-sentence summary of the position or perspective the article takes
        topicTags:
          type: array
          items:
            type: string
        teaserSummary:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        scrapedAt:
          type: string
        content:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, selected, dismissed]
        disciplineAlignment:
          type: ["string", "null"]
      required:
        - id
        - headline
        - url
        - sourceName
        - relevancyScore
        - topicTags
        - scrapedAt
        - status
        - isEmergingSignal
        - isPrimarySignal

    DigestArticle:
      type: object
      properties:
        id:
          type: integer
        articleType:
          type: string
          enum: [daily_brief, topic_article]
        headline:
          type: string
        body:
          type: string
        executiveSummary:
          type: array
          items:
            type: string
        rgiTake:
          type: string
        keyTakeaways:
          type: array
          items:
            type: string
        implificationsForLeaders:
          type: array
          items:
            type: string
        whatToWatch:
          type: array
          items:
            type: string
        topicTags:
          type: array
          items:
            type: string
        sourceArticleIds:
          type: array
          items:
            type: integer
        sourceArticles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        relevancyScore:
          type: ["number", "null"]
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, regenerating]
        editorNotes:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        discipline:
          type: ["string", "null"]
      required:
        - id
        - articleType
        - headline
        - body
        - executiveSummary
        - rgiTake
        - keyTakeaways
        - implificationsForLeaders
        - whatToWatch
        - topicTags
        - sourceArticleIds
        - status
        - createdAt
        - updatedAt

    GenerateDigestBody:
      type: object
      properties:
        articleIds:
          type: array
          items:
            type: integer
          minItems: 1
        editorNotes:
          type: ["string", "null"]
      required:
        - articleIds

    UpdateDigestArticleBody:
      type: object
      properties:
        headline:
          type: string
        body:
          type: string
        rgiTake:
          type: string
        executiveSummary:
          type: array
          items:
            type: string
        keyTakeaways:
          type: array
          items:
            type: string
        implificationsForLeaders:
          type: array
          items:
            type: string
        topicTags:
          type: array
          items:
            type: string
        editorNotes:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, regenerating]

    RejectDigestBody:
      type: object
      properties:
        reason:
          type: ["string", "null"]

    RegenerateDigestBody:
      type: object
      properties:
        editorNotes:
          type: ["string", "null"]

    Source:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [rss, website, twitter, linkedin, institutional, corporate, market]
        tier:
          type: integer
          enum: [1, 2, 3]
        isActive:
          type: boolean
        authorName:
          type: ["string", "null"]
        authorType:
          type: ["string", "null"]
        authorityLevel:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - url
        - type
        - tier
        - isActive
        - createdAt

    CreateSourceBody:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [rss, website, twitter, linkedin, institutional, corporate, market]
        tier:
          type: integer
          enum: [1, 2, 3]
        authorName:
          type: ["string", "null"]
        authorType:
          type: ["string", "null"]
        authorityLevel:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
      required:
        - name
        - url
        - type
        - tier

    UpdateSourceBody:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        tier:
          type: integer
          enum: [1, 2, 3]
        isActive:
          type: boolean
        authorName:
          type: ["string", "null"]
        authorType:
          type: ["string", "null"]
        authorityLevel:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        weight:
          type: number
          minimum: 0.5
          maximum: 2

    DashboardSummary:
      type: object
      properties:
        totalArticlesToday:
          type: integer
        pendingReview:
          type: integer
        approvedToday:
          type: integer
        rejectedToday:
          type: integer
        topArticles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        topPicks:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        lastScrapeAt:
          type: ["string", "null"]
        contentWindowStart:
          type: string
        articlesByTag:
          type: array
          items:
            $ref: "#/components/schemas/TagCount"
        topicIntelligence:
          type: array
          items:
            $ref: "#/components/schemas/TopicIntelligence"
        totalSources:
          type: integer
        activeSources:
          type: integer
        socialSignalsCount:
          type: integer
