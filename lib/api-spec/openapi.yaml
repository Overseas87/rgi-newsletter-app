openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification for RGI Strategic Intelligence System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Scraped article operations
  - name: sources
    description: Source management
  - name: digest
    description: AI-generated digest articles
  - name: dashboard
    description: Dashboard summary operations
  - name: scrape
    description: Scraping operations
  - name: professors
    description: Professor Library operations
  - name: opportunities
    description: Internal frozen Story Opportunity and deterministic professor-matching operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scrape/trigger:
    post:
      operationId: triggerScrape
      tags: [scrape]
      summary: Manually trigger a scrape
      description: Triggers an immediate scrape of all active sources
      responses:
        "200":
          description: Scrape triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeResult"

  /scrape/status:
    get:
      operationId: getScrapeStatus
      tags: [scrape]
      summary: Get last scrape status
      responses:
        "200":
          description: Scrape status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeStatus"

  /professors/config:
    get:
      operationId: getProfessorLibraryConfig
      tags: [professors]
      summary: Get Professor Library configuration
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      responses:
        "200":
          description: Professor Library configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorLibraryConfigResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /professors:
    get:
      operationId: listProfessorProfiles
      tags: [professors]
      summary: List professor profiles
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - name: status
          in: query
          description: Filter by whether a professor is included in future article matching.
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Professor profile list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfessorProfilesResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"
    post:
      operationId: createProfessorProfile
      tags: [professors]
      summary: Create a professor profile
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfessorProfileBody"
      responses:
        "201":
          description: Created professor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /professors/{id}:
    get:
      operationId: getProfessorProfile
      tags: [professors]
      summary: Get a professor profile
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{8,128}$'
      responses:
        "200":
          description: Professor profile detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"
    patch:
      operationId: updateProfessorProfile
      tags: [professors]
      summary: Update a professor profile
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{8,128}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfessorProfileBody"
      responses:
        "200":
          description: Updated professor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorProfileDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /opportunity-windows/config:
    get:
      operationId: getStoryOpportunityConfig
      tags: [opportunities]
      summary: Get internal Story Opportunity feature configuration
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      responses:
        "200":
          description: Feature configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityConfigResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /opportunity-windows:
    get:
      operationId: listStoryOpportunityWindows
      tags: [opportunities]
      summary: List completed frozen Story Opportunity windows
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      responses:
        "200":
          description: Frozen window list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStoryOpportunityWindowsResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /opportunity-windows/current:
    get:
      operationId: getCurrentStoryOpportunityWindow
      tags: [opportunities]
      summary: Get the latest completed frozen window and its shortlist
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      responses:
        "200":
          description: Current window or an explicit no-window response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityListResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /opportunity-windows/calculate:
    post:
      operationId: calculateStoryOpportunityWindow
      tags: [opportunities]
      summary: Explicitly and idempotently calculate one frozen daily window
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateStoryOpportunityWindowBody"
      responses:
        "200":
          description: Existing frozen window returned unchanged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateStoryOpportunityWindowResponse"
        "201":
          description: Frozen window created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateStoryOpportunityWindowResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /opportunity-windows/{windowId}/opportunities:
    get:
      operationId: listStoryOpportunitiesForWindow
      tags: [opportunities]
      summary: List the frozen shortlist for one window
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityWindowId"
      responses:
        "200":
          description: Frozen opportunity shortlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityListResponse"
        "404":
          description: Window not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}:
    get:
      operationId: getStoryOpportunity
      tags: [opportunities]
      summary: Get one Story Opportunity workbench record
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      responses:
        "200":
          description: Story Opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "404":
          description: Opportunity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/matches:
    get:
      operationId: listStoryOpportunityProfessorMatches
      tags: [opportunities]
      summary: List persisted deterministic Professor Matches
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      responses:
        "200":
          description: Professor Match list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessorMatchListResponse"
        "404":
          description: Opportunity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/select-professor:
    post:
      operationId: selectStoryOpportunityProfessor
      tags: [opportunities]
      summary: Manually select or change the professor for an opportunity
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectStoryOpportunityProfessorBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "400":
          description: Override reason required or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Opportunity revision conflict, frozen match exclusion, or PROFESSOR_PROFILE_REVISION_CONFLICT when the current Professor Profile no longer matches the frozen revision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/clear-professor:
    post:
      operationId: clearStoryOpportunityProfessor
      tags: [opportunities]
      summary: Clear the current manual professor selection
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearStoryOpportunityProfessorBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "409":
          description: Opportunity revision conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/update-angle:
    post:
      operationId: updateStoryOpportunityAngle
      tags: [opportunities]
      summary: Update the editor-controlled recommended angle
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryOpportunityAngleBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "409":
          description: Opportunity revision conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/close:
    post:
      operationId: closeStoryOpportunity
      tags: [opportunities]
      summary: Close a Story Opportunity
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryOpportunityRevisionCommandBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "409":
          description: Opportunity revision conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /story-opportunities/{id}/reopen:
    post:
      operationId: reopenStoryOpportunity
      tags: [opportunities]
      summary: Reopen a closed Story Opportunity
      security:
        - FirebaseEditorAuth: []
        - InternalServiceKey: []
      parameters:
        - $ref: "#/components/parameters/StoryOpportunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryOpportunityRevisionCommandBody"
      responses:
        "200":
          description: Updated opportunity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOpportunityDetailResponse"
        "401":
          $ref: "#/components/responses/InternalEditorUnauthorized"
        "403":
          $ref: "#/components/responses/InternalEditorForbidden"
        "409":
          description: Opportunity revision conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/InternalEditorAuthUnavailable"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List scraped articles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, selected, dismissed]
        - name: minScore
          in: query
          schema:
            type: number
        - name: topicTag
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
            enum: [news, twitter, linkedin]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [relevance, time, source]
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete a scraped article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /digest:
    get:
      operationId: listDigestArticles
      tags: [digest]
      summary: List digest articles (generated, pending review, approved, rejected)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_review, approved, rejected, regenerating]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of digest articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigestArticle"

  /digest/generate:
    post:
      operationId: generateDigestArticle
      tags: [digest]
      summary: Generate an RGI Strategic Brief from one or more scraped articles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDigestBody"
      responses:
        "201":
          description: Generated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}:
    get:
      operationId: getDigestArticle
      tags: [digest]
      summary: Get a single digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDigestArticle
      tags: [digest]
      summary: Update a digest article (edit content, status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDigestArticleBody"
      responses:
        "200":
          description: Updated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDigestArticle
      tags: [digest]
      summary: Delete a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /digest/{id}/approve:
    post:
      operationId: approveDigestArticle
      tags: [digest]
      summary: Approve and publish a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}/reject:
    post:
      operationId: rejectDigestArticle
      tags: [digest]
      summary: Reject a digest article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDigestBody"
      responses:
        "200":
          description: Rejected digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /digest/{id}/regenerate:
    post:
      operationId: regenerateDigestArticle
      tags: [digest]
      summary: Regenerate a digest article with optional editor notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateDigestBody"
      responses:
        "200":
          description: Regenerated digest article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticle"

  /sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List all sources
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
    post:
      operationId: createSource
      tags: [sources]
      summary: Add a new source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSourceBody"
      responses:
        "201":
          description: Created source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"

  /sources/{id}:
    patch:
      operationId: updateSource
      tags: [sources]
      summary: Update a source (enable/disable, change tier, authority level)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceBody"
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
    delete:
      operationId: deleteSource
      tags: [sources]
      summary: Remove a source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/settings:
    get:
      operationId: getSettings
      tags: [dashboard]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [dashboard]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  securitySchemes:
    FirebaseEditorAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
      description: Firebase ID token for a user whose UID is present in the server-only approved RGI editor allowlist. Missing verification configuration fails closed.
    InternalServiceKey:
      type: apiKey
      in: header
      name: x-admin-api-key
      description: Trusted server-to-server operational credential. This key must never be embedded in or sent by the browser application.
  responses:
    InternalEditorUnauthorized:
      description: Missing, malformed, invalid, expired, or revoked Firebase ID token, or invalid internal service credential
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalEditorForbidden:
